services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sorosoro-app:local
    container_name: sorosoro-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/sorosoro}
      DB_USERNAME: ${DB_USERNAME:-sorosoro}
      DB_PASSWORD: ${DB_PASSWORD:-sorosoro}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: sorosoro-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sorosoro}
      POSTGRES_USER: ${POSTGRES_USER:-sorosoro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sorosoro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sorosoro} -d ${POSTGRES_DB:-sorosoro}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
