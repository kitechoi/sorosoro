spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sorosoro}
    username: ${DB_USERNAME:sorosoro}
    password: ${DB_PASSWORD:sorosoro}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.sorosoro: debug
    org.hibernate.SQL: debug
